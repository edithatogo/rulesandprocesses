name: v1 Release Qualification

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: v1-release-qualification
  cancel-in-progress: false

jobs:
  qualify-candidate:
    name: Qualify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: release
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.11.8

      - name: Run complete repository gate
        run: make check

      - name: Require ready release audit
        run: |
          PYTHONPATH=. uv run python -m tools.v1_release_audit \
            conductor/v1-release-gates.json \
            --as-of "$(date -u +%Y-%m-%d)" \
            --output conductor/tracks/v1_release_20260714/V1_RELEASE_GATE_AUDIT.json

      - name: Verify candidate integrity
        run: |
          test "$(shasum -a 256 conductor/tracks/v1_release_20260714/release-candidate/current/SHA256SUMS | cut -d ' ' -f 1)" != ""
          shasum -a 256 -c conductor/tracks/v1_release_20260714/release-candidate/current/SHA256SUMS

      - name: Attest candidate artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            conductor/tracks/v1_release_20260714/release-candidate/current/rac-conformance-v1.0.0-rc.1.tar.gz
            conductor/tracks/v1_release_20260714/release-candidate/current/pic_contracts-0.1.0-py3-none-any.whl
            conductor/tracks/v1_release_20260714/release-candidate/current/pic_contracts-0.1.0.tar.gz

      - name: Upload qualification evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v1-release-qualification
          path: |
            conductor/tracks/v1_release_20260714/release-candidate/current/CANDIDATE_MANIFEST.json
            conductor/tracks/v1_release_20260714/release-candidate/current/PROVENANCE.json
            conductor/tracks/v1_release_20260714/release-candidate/current/SHA256SUMS
            conductor/tracks/v1_release_20260714/V1_RELEASE_GATE_AUDIT.json
            conductor/v1-release-gates.json
          if-no-files-found: error
          retention-days: 90
