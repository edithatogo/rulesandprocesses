name: v1 Release Qualification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v1-release-qualification
  cancel-in-progress: false

jobs:
  qualify-candidate:
    name: Qualify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: release
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.11.8

      - name: Run complete repository gate
        run: make check

      - name: Verify release gate and candidate integrity
        run: |
          uv run python -m tools.release_gates conductor/v1-release-gates.json --as-of "$(date -u +%Y-%m-%d)"
          test "$(shasum -a 256 conductor/tracks/v1_release_20260714/release-candidate/current/SHA256SUMS | cut -d ' ' -f 1)" != ""
          shasum -a 256 -c conductor/tracks/v1_release_20260714/release-candidate/current/SHA256SUMS

      - name: Upload qualification evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: v1-release-qualification
          path: |
            conductor/tracks/v1_release_20260714/release-candidate/current/CANDIDATE_MANIFEST.json
            conductor/tracks/v1_release_20260714/release-candidate/current/PROVENANCE.json
            conductor/tracks/v1_release_20260714/release-candidate/current/SHA256SUMS
            conductor/v1-release-gates.json
          if-no-files-found: error
          retention-days: 90
